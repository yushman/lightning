# One-off: publish the v0.1.0 release that became a draft when its tag
# was recreated. Safe to delete after it has run once.
name: publish-draft

on:
  push:
    branches: [main]
    paths: [.github/workflows/publish-draft.yml]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - run: gh release edit v0.1.0 --repo "$GITHUB_REPOSITORY" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
