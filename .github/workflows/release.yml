name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # the release itself is created on the first tag push (or by hand);
  # upload-rust-binary-action attaches assets to the release of the tag
  upload-binaries:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/setup-cross-toolchain-action@v1
        if: runner.os == 'Linux'
        with:
          target: ${{ matrix.target }}
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: lightning,lightning-server
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
